<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>appGastos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/appGastos/manifest.json">
  <meta name="theme-color" content="#F59E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/appGastos/icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="errorStorage" class="hidden">
    El navegador no permite acceder a localStorage. Los datos no se guardarán.
  </div>

  <div id="app">

    <!-- ── Sidebar: formulario ── -->
    <aside class="sidebar">
      <button id="btnCerrarSidebar" class="btn-cerrar-sidebar" aria-label="Cerrar formulario">×</button>
      <h1>app<span>Gastos</span></h1>

      <form id="formGasto" novalidate>

        <div class="campo">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="campo">
          <label for="monto">Monto (DOP)</label>
          <input type="number" id="monto" name="monto" min="0.01" step="0.01" placeholder="0.00" required>
        </div>

        <div class="campo">
          <label for="categoria">Categoría</label>
          <select id="categoria" name="categoria" required>
            <option value="">Seleccionar...</option>
            <option>Alimentación</option>
            <option>Transporte</option>
            <option>Ocio</option>
            <option>Salud</option>
            <option>Ropa</option>
            <option>Servicios</option>
            <option>Otros</option>
          </select>
        </div>

        <div class="campo">
          <label for="descripcion">Descripción (opcional)</label>
          <input type="text" id="descripcion" name="descripcion" placeholder="Ej. Almuerzo en restaurante">
        </div>

        <button type="submit" id="btnAgregar" disabled>Agregar gasto</button>

      </form>
    </aside>

    <!-- ── Dashboard ── -->
    <main class="dashboard">

      <header class="header-mobile">app<span>Gastos</span></header>

      <div class="periodo-tabs">
        <button class="tab activo" data-periodo="semanal">Semanal</button>
        <button class="tab" data-periodo="mensual">Mensual</button>
        <button class="tab" data-periodo="anual">Anual</button>
      </div>

      <div class="graficos">
        <div class="grafico-container">
          <h3>Gasto por categoría</h3>
          <canvas id="graficoDona"></canvas>
        </div>
        <div class="grafico-container">
          <h3>Evolución del gasto</h3>
          <canvas id="graficoBarras"></canvas>
        </div>
      </div>

      <div id="leyendas" class="leyendas"></div>

      <div class="tabla-container">
        <h3>Gastos registrados</h3>
        <div class="tabla-scroll">
          <table id="tablaGastos">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Monto (DOP)</th>
              </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
          </table>
        </div>
        <p id="mensajeVacio" class="mensaje-vacio hidden">Aún no hay gastos registrados.</p>
      </div>

    </main>

    <!-- FAB y overlay solo para mobile -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <button id="btnNuevoGasto" class="fab" aria-label="Agregar nuevo gasto">+</button>

  </div>

  <!-- ── Modal: editar gasto ── -->
  <div id="modalEditar" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Editar gasto</h2>
        <button id="btnCerrarModal" aria-label="Cerrar">×</button>
      </div>

      <form id="formEditar" novalidate>
        <div class="campo">
          <label for="editFecha">Fecha</label>
          <input type="date" id="editFecha" required>
        </div>
        <div class="campo">
          <label for="editMonto">Monto (DOP)</label>
          <input type="number" id="editMonto" min="0.01" step="0.01" required>
        </div>
        <div class="campo">
          <label for="editCategoria">Categoría</label>
          <select id="editCategoria" required>
            <option value="">Seleccionar...</option>
            <option>Alimentación</option>
            <option>Transporte</option>
            <option>Ocio</option>
            <option>Salud</option>
            <option>Ropa</option>
            <option>Servicios</option>
            <option>Otros</option>
          </select>
        </div>
        <div class="campo">
          <label for="editDescripcion">Descripción (opcional)</label>
          <input type="text" id="editDescripcion" placeholder="Ej. Almuerzo en restaurante">
        </div>

        <div class="modal-acciones">
          <button type="button" id="btnEliminarDesdeModal" class="btn-peligro">Eliminar</button>
          <div class="modal-acciones-derecha">
            <button type="button" id="btnCancelarModal" class="btn-secundario">Cancelar</button>
            <button type="submit" id="btnGuardarEdicion" class="btn-primario">Guardar cambios</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('/appGastos/sw.js');
  </script>
</body>
</html>
