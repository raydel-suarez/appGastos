<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>appGastos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="errorStorage" class="hidden">
    El navegador no permite acceder a localStorage. Los datos no se guardarán.
  </div>

  <div id="app">

    <!-- ── Sidebar: formulario ── -->
    <aside class="sidebar">
      <h1>app<span>Gastos</span></h1>

      <form id="formGasto" novalidate>

        <div class="campo">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>

        <div class="campo">
          <label for="monto">Monto (DOP)</label>
          <input type="number" id="monto" name="monto" min="0.01" step="0.01" placeholder="0.00" required>
        </div>

        <div class="campo">
          <label for="categoria">Categoría</label>
          <select id="categoria" name="categoria" required>
            <option value="">Seleccionar...</option>
            <option>Alimentación</option>
            <option>Transporte</option>
            <option>Ocio</option>
            <option>Salud</option>
            <option>Ropa</option>
            <option>Servicios</option>
            <option>Otros</option>
          </select>
        </div>

        <div class="campo">
          <label for="descripcion">Descripción (opcional)</label>
          <input type="text" id="descripcion" name="descripcion" placeholder="Ej. Almuerzo en restaurante">
        </div>

        <button type="submit" id="btnAgregar" disabled>Agregar gasto</button>

      </form>
    </aside>

    <!-- ── Dashboard ── -->
    <main class="dashboard">

      <div class="periodo-tabs">
        <button class="tab activo" data-periodo="semanal">Semanal</button>
        <button class="tab" data-periodo="mensual">Mensual</button>
        <button class="tab" data-periodo="anual">Anual</button>
      </div>

      <div class="graficos">
        <div class="grafico-container">
          <h3>Gasto por categoría</h3>
          <canvas id="graficoDona"></canvas>
        </div>
        <div class="grafico-container">
          <h3>Evolución del gasto</h3>
          <canvas id="graficoBarras"></canvas>
        </div>
      </div>

      <div id="leyendas" class="leyendas"></div>

      <div class="tabla-container">
        <h3>Gastos registrados</h3>
        <table id="tablaGastos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Categoría</th>
              <th>Descripción</th>
              <th>Monto (DOP)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>
        <p id="mensajeVacio" class="mensaje-vacio hidden">Aún no hay gastos registrados.</p>
      </div>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
